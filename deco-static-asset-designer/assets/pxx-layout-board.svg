<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Pxx 基础道具资产页布局板：左=3/4 特写区,右=正/侧/背三视图三列。作构图参考用,低权重绑定;上传平台前转 PNG。 -->
  <rect width="1600" height="900" fill="#d4d4d4"/>
  <!-- 左:3/4 特写区 -->
  <rect x="50" y="50" width="560" height="800" fill="#c7c7c7" stroke="#9a9a9a" stroke-width="4"/>
  <g transform="translate(330,450) rotate(-18)">
    <rect x="-190" y="-120" width="380" height="240" rx="18" fill="#bdbdbd"/>
    <rect x="-150" y="-80" width="300" height="160" rx="10" fill="#c7c7c7"/>
  </g>
  <!-- 右:三视图三列 -->
  <g fill="#c7c7c7" stroke="#9a9a9a" stroke-width="4">
    <rect x="660" y="50" width="280" height="800"/>
    <rect x="970" y="50" width="280" height="800"/>
    <rect x="1280" y="50" width="280" height="800"/>
  </g>
  <g fill="#bdbdbd">
    <rect x="700" y="330" width="200" height="240" rx="12"/>
    <rect x="1055" y="330" width="110" height="240" rx="12"/>
    <rect x="1320" y="330" width="200" height="240" rx="12"/>
  </g>
  <!-- 共享基准线 -->
  <line x1="660" y1="575" x2="1560" y2="575" stroke="#9a9a9a" stroke-width="3" stroke-dasharray="14 10"/>
</svg>
