name: validate-deco-skills

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate-deco-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill contracts and frozen surfaces
        run: python scripts/validate_deco_skills.py --skills-root .

      - name: Run anonymous contract fixtures
        run: |
          python -m unittest discover -s deco-helper/tests -p 'test_*.py' -v
          python -m unittest discover -s tests -p 'test_*.py' -v
